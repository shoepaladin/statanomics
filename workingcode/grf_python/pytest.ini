[pytest]
testpaths = tests
# -m 'not performance' excludes the opt-in wall-clock benchmarks from the
# default run; they are non-deterministic under CPU contention and are not a
# correctness signal.  Run them explicitly with `pytest -m performance`.
addopts = -v --tb=short -m "not performance"
markers =
    performance: opt-in wall-clock benchmarks, excluded from the default run.
log_cli = true
log_cli_level = WARNING
